<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wrapper {
            position: relative; width: 100%; max-width: 420px; margin: 20px;
            padding: 2px; border-radius: 18px;
            background: linear-gradient(45deg, #EF4444, #DC2626, #991B1B, #EF4444);
            background-size: 300% 300%;
            animation: borderGlow 6s ease infinite;
        }
        .wrapper::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, #EF4444, #DC2626, #991B1B, #EF4444);
            background-size: 300% 300%; border-radius: 18px;
            filter: blur(14px); opacity: 0.5; z-index: -1;
            animation: borderGlow 6s ease infinite;
        }
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background-color: #000000; border-radius: 16px;
            padding: 40px; color: #ffffff;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
        .header p { font-size: 14px; color: #9CA3AF; }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #E5E7EB; }
        .input-group input {
            width: 100%; padding: 12px 16px; background-color: #ffffff;
            border: 2px solid transparent; border-radius: 8px;
            font-size: 15px; font-family: inherit; color: #000000;
            transition: all 0.3s ease; outline: none;
        }
        .input-group input:focus { border-color: #EF4444; box-shadow: 0 0 0 4px rgba(239,68,68,0.15); }
        .submit-btn {
            width: 100%; padding: 14px; margin-top: 10px;
            background-color: #EF4444; color: #ffffff; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: all 0.3s ease;
        }
        .submit-btn:hover { background-color: #DC2626; transform: translateY(-2px); }
        .submit-btn:disabled { background-color: #6B7280; cursor: not-allowed; transform: none; }
        .message-box {
            margin-top: 16px; padding: 12px 16px; border-radius: 8px;
            font-size: 14px; text-align: center; display: none;
        }
        .message-box.success { background-color: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid #EF4444; }
        .message-box.error { background-color: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid #EF4444; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h2>Set New Password</h2>
                <p>Enter your new password below</p>
            </div>

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password">
            </div>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>

            <button class="submit-btn" id="submitBtn" onclick="resetPassword()">
                Update Password
            </button>

            <div class="message-box" id="messageBox"></div>
            <div class="message-box" id="messageBox"></div>

<!-- ADD THIS -->
<p style="text-align:center; margin-top:16px; font-size:13px; color:#9CA3AF;">
    Remember your password? 
    <a href="index.html" style="color:#EF4444; font-weight:600; text-decoration:none;">
        Back to Login
    </a>
</p>
        </div>
    </div>

    <script>
        // ✅ Same Supabase credentials as your login page
        const { createClient } = supabase
        const SUPABASE_URL = 'https://owucxxsxsknujeofdbwx.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_zHDocadfoObmE3XGK1epYw_9R7xqbB6'
        const client = createClient(SUPABASE_URL, SUPABASE_KEY)

        function showMessage(text, type) {
            const box = document.getElementById('messageBox')
            box.textContent = text
            box.className = 'message-box ' + type
            box.style.display = 'block'
        }

        async function resetPassword() {
            const newPassword    = document.getElementById('newPassword').value.trim()
            const confirmPassword = document.getElementById('confirmPassword').value.trim()
            const btn = document.getElementById('submitBtn')

            // Validation
            if (!newPassword || !confirmPassword) {
                showMessage('Please complete both password fields.', 'error')
                return
            }
            if (newPassword !== confirmPassword) {
                showMessage('The provided passwords do not match.', 'error')
                return
            }
            if (newPassword.length < 6) {
                showMessage('The new password must be at least 6 characters in length.', 'error')
                return
            }

            btn.disabled = true
            btn.textContent = 'Updating...'

            // ✅ This updates the password using the token from the email link
            const { error } = await client.auth.updateUser({ password: newPassword })

            if (error) {
                showMessage(error.message, 'error')
                btn.disabled = false
                btn.textContent = 'Update Password'
            } else {
                showMessage('Password successfully updated. Redirecting to login...', 'success')
                setTimeout(() => window.location.href = 'login.html', 2000)
            }
        }
    </script>
</body>
</html>
