<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .logo-container {
            position: absolute; top: 15px; left: 15px; z-index: 20;
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: #000000; font-weight: 600; font-size: 22px;
        }
        .custom-logo {
            width: 250px; height: 150px; object-fit: contain;
            object-position: top left; mix-blend-mode: darken;
            filter: brightness(1.1) contrast(1.2);
        }
        .tech-grid {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(to right, rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 0; pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at center, transparent 15%, black 70%);
            mask-image: radial-gradient(circle at center, transparent 15%, black 70%);
        }
        .glass-shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 15px 35px rgba(239,68,68,0.1);
            z-index: 1; pointer-events: none;
            animation: float3D 10s infinite alternate ease-in-out;
        }
        .glass-1 { width: 350px; height: 350px; border-radius: 50%; top: -100px; right: -50px; }
        .glass-2 { width: 250px; height: 250px; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; bottom: -50px; left: -80px; animation-delay: -3s; }
        .glass-3 { width: 120px; height: 120px; border-radius: 24px; top: 20%; left: 10%; animation: float3D-alt 8s infinite alternate ease-in-out; animation-delay: -5s; }
        @keyframes float3D { 0% { transform: translateY(0) rotate(0deg) scale(1); } 100% { transform: translateY(-30px) rotate(15deg) scale(1.05); } }
        @keyframes float3D-alt { 0% { transform: translateY(0) rotate(45deg) scale(1); } 100% { transform: translateY(-40px) rotate(70deg) scale(1.1); } }
        .data-flow { position: absolute; background: rgba(239,68,68,0.15); overflow: hidden; z-index: 1; pointer-events: none; }
        .data-flow::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, #EF4444, transparent); animation: flowDataH 2.5s linear infinite; }
        .flow-1 { width: 250px; height: 2px; top: 25.5%; left: 5%; transform: rotate(15deg); }
        .flow-2 { width: 300px; height: 2px; bottom: 20.5%; right: 2%; transform: rotate(-25deg); }
        .data-flow-v { position: absolute; background: rgba(239,68,68,0.15); overflow: hidden; z-index: 1; pointer-events: none; }
        .data-flow-v::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent, #EF4444, transparent); animation: flowDataV 3s linear infinite; }
        .flow-3 { width: 2px; height: 200px; top: 10%; right: 25.5%; }
        @keyframes flowDataH { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes flowDataV { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .ai-node { position: absolute; width: 10px; height: 10px; background-color: #EF4444; border-radius: 50%; box-shadow: 0 0 15px 5px rgba(239,68,68,0.4); z-index: 2; animation: pulseNode 2s infinite alternate; }
        .node-1 { top: 27%; left: 23%; } .node-2 { top: 60%; right: 12%; }
        .node-3 { bottom: 23%; left: 30%; animation-delay: -1s; } .node-4 { top: 10%; right: 25.5%; animation-delay: -0.5s; }
        @keyframes pulseNode { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.4); opacity: 1; } }
        .tech-doodle { position: absolute; opacity: 0.15; color: #EF4444; z-index: 1; pointer-events: none; animation: floatDoodle 15s infinite linear; }
        .tech-doodle svg { width: 100%; height: 100%; }
        .doodle-1 { width: 70px; height: 70px; top: 18%; right: 15%; }
        .doodle-2 { width: 55px; height: 55px; bottom: 15%; left: 8%; animation-delay: -5s; animation-direction: reverse; }
        .doodle-3 { width: 60px; height: 60px; top: 50%; left: 4%; animation-delay: -10s; }
        .doodle-4 { width: 65px; height: 65px; bottom: 25%; right: 6%; animation-delay: -7s; animation-direction: reverse; }
        @keyframes floatDoodle { 0% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } 100% { transform: translateY(0) rotate(0deg); } }
        .login-wrapper {
            position: relative; width: 100%; max-width: 420px; margin: 20px;
            padding: 2px; border-radius: 18px;
            background: linear-gradient(45deg, #EF4444, #DC2626, #991B1B, #EF4444);
            background-size: 300% 300%; animation: borderGlow 6s ease infinite; z-index: 10;
        }
        .login-wrapper::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, #EF4444, #DC2626, #991B1B, #EF4444);
            background-size: 300% 300%; border-radius: 18px;
            filter: blur(14px); opacity: 0.5; z-index: -1; animation: borderGlow 6s ease infinite;
        }
        @keyframes borderGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .login-form-container {
            background-color: #000000; border-radius: 16px;
            padding: 40px; position: relative; z-index: 2; color: #ffffff;
        }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
        .form-header p { font-size: 14px; color: #9CA3AF; }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #E5E7EB; }
        .input-group input {
            width: 100%; padding: 12px 16px; background-color: #ffffff;
            border: 2px solid transparent; border-radius: 8px;
            font-size: 15px; font-family: inherit; color: #000000;
            transition: all 0.3s ease; outline: none;
        }
        .input-group input::placeholder { color: #9CA3AF; }
        .input-group input:focus { border-color: #EF4444; box-shadow: 0 0 0 4px rgba(239,68,68,0.15); }
        .submit-btn {
            width: 100%; padding: 14px; margin-top: 10px;
            background-color: #EF4444; color: #ffffff; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: all 0.3s ease;
        }
        .submit-btn:hover { background-color: #DC2626; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239,68,68,0.4); }
        .submit-btn:disabled { background-color: #6B7280; cursor: not-allowed; transform: none; }

        /* Message Box */
        .message-box {
            margin-top: 16px; padding: 12px 16px;
            border-radius: 8px; font-size: 14px;
            text-align: center; display: none;
        }
        .message-box.success { background-color: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid #EF4444; }
        .message-box.error { background-color: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid #EF4444; }

        /* Toggle link */
        .toggle-link {
            text-align: center; margin-top: 16px;
            font-size: 13px; color: #9CA3AF;
        }
        .toggle-link span {
            color: #EF4444; cursor: pointer; font-weight: 600;
        }
        .toggle-link span:hover { text-decoration: underline; }
        .forgot-link { color: #EF4444; font-size: 13px; font-weight: 600; cursor: pointer; }
        .forgot-link:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-form-container { padding: 30px 20px; }
            .form-header h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <a href="#" class="logo-container">
        <img src="../Screenshot_2026-06-15_094035-removebg-preview.png" alt="Company Logo" class="custom-logo">
    </a>

    <div class="tech-grid"></div>
    <div class="data-flow flow-1"></div>
    <div class="data-flow flow-2"></div>
    <div class="data-flow-v flow-3"></div>
    <div class="ai-node node-1"></div>
    <div class="ai-node node-2"></div>
    <div class="ai-node node-3"></div>
    <div class="ai-node node-4"></div>
    <div class="glass-shape glass-1"></div>
    <div class="glass-shape glass-2"></div>
    <div class="glass-shape glass-3"></div>

    <div class="tech-doodle doodle-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
    </div>
    <div class="tech-doodle doodle-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </div>
    <div class="tech-doodle doodle-3">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    </div>
    <div class="tech-doodle doodle-4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>

    <!-- Login Form -->
    <div class="login-wrapper">
        <div class="login-form-container">
            <div class="form-header">
                <h2 id="formTitle">Welcome</h2>
                <p id="formSubtitle">Please enter your details to sign up</p>
            </div>

            <div class="input-group" id="nameGroup">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe">
            </div>
            <div class="input-group" id="mobileGroup">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" placeholder="9999900000">
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="john@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Sign Up</button>

            <p id="forgotPasswordContainer" style="text-align:center; margin-top:12px; display: none;">
                <span onclick="forgotPassword()" 
                      style="color:#EF4444; cursor:pointer; font-size:13px; font-weight:500;">
                    Forgot Password?
                </span>
            </p>

            <!-- Success / Error Message -->
            <div class="message-box" id="messageBox"></div>

            <!-- Toggle between Login and Sign Up -->
            <div class="toggle-link">
                <span id="toggleText">Already have an account? </span>
                <span onclick="toggleMode()">Login</span>
            </div>
        </div>
    </div>

    <script>
        // ✅ Supabase Init — no extra spaces!
        const { createClient } = supabase
        const SUPABASE_URL = 'https://owucxxsxsknujeofdbwx.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_zHDocadfoObmE3XGK1epYw_9R7xqbB6'
        const client = createClient(SUPABASE_URL, SUPABASE_KEY)

        // Mode: 'signup' or 'login'
        let currentMode = 'signup'

        // Toggle between Login and Sign Up
        function toggleMode() {
            currentMode = currentMode === 'signup' ? 'login' : 'signup'

            const isSignup = currentMode === 'signup'
            document.getElementById('formTitle').textContent = isSignup ? 'Welcome' : 'Welcome Back'
            document.getElementById('formSubtitle').textContent = isSignup ? 'Please enter your details to sign up' : 'Please enter your details to login'
            document.getElementById('submitBtn').textContent = isSignup ? 'Sign Up' : 'Login'
            document.getElementById('nameGroup').style.display = isSignup ? 'flex' : 'none'
            document.getElementById('mobileGroup').style.display = isSignup ? 'flex' : 'none'
            document.getElementById('toggleText').textContent = isSignup ? 'Already have an account? ' : "Don't have an account? "
            hideMessage()
            document.getElementById('forgotPasswordContainer').style.display = isSignup ? 'none' : 'block'
        }

        // Show message box
        function showMessage(text, type) {
            const box = document.getElementById('messageBox')
            box.textContent = text
            box.className = 'message-box ' + type
            box.style.display = 'block'
        }

        function hideMessage() {
            document.getElementById('messageBox').style.display = 'none'
        }

        // Main handler
        async function handleSubmit() {
            const email    = document.getElementById('email').value.trim()
            const password = document.getElementById('password').value.trim()
            const btn      = document.getElementById('submitBtn')

            if (!email || !password) {
                showMessage('Please provide both an email address and a password.', 'error')
                return
            }
            
            if (currentMode === 'signup') {
                const mobile = document.getElementById('mobileNumber').value.trim()
                if (!/^\d{10}$/.test(mobile)) {
                    showMessage('Invalid details: Mobile number must be exactly 10 digits.', 'error')
                    return
                }
            }

            btn.disabled = true
            btn.textContent = 'Please wait...'
            hideMessage()

            if (currentMode === 'signup') {
                await handleSignUp(email, password)
            } else {
                await handleLogin(email, password)
            }

            btn.disabled = false
            btn.textContent = currentMode === 'signup' ? 'Sign Up' : 'Login'
        }

        // Sign Up
        async function handleSignUp(email, password) {
            const fullName = document.getElementById('fullName').value.trim()
            const mobile   = document.getElementById('mobileNumber').value.trim()

            const { data, error } = await client.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: fullName, mobile: mobile }  // saved to user profile
                }
            })

            if (error) {
                showMessage(error.message, 'error')
            } else {
                showMessage('Account created successfully. You may now log in.', 'success')
                // Auto switch to login after signup
                setTimeout(() => toggleMode(), 2000)
            }
        }

        // Login
        async function handleLogin(email, password) {
            const { data, error } = await client.auth.signInWithPassword({ email, password })

            if (error) {
                showMessage(error.message, 'error')
            } else {
                showMessage('Login successful. Redirecting securely...', 'success')
                // 🔁 Change 'dashboard.html' to your next page
              setTimeout(() => window.location.href = 'https://saithwork28-hue.github.io/projects/', 1500)
            }
        }
        
        // Forgot Password
        async function forgotPassword() {
            const email = document.getElementById('email').value.trim()

            if (!email) {
                showMessage('Please enter your email address to reset your password.', 'error')
                return
            }

            const { error } = await client.auth.resetPasswordForEmail(email, {
                redirectTo: 'http://127.0.0.1:5500/reset.html'  // Corrected to match your reset.html file
            })

            if (error) {
                showMessage(error.message, 'error')
            } else {
                showMessage('A password reset link has been dispatched to your email.', 'success')
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleSubmit()
        })
    </script>
</body>
</html>
